<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>МУЗИ ДОГ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #05070f;
            --bg-sidebar: #0b0d16;
            --bg-card: #121624;
            --border: #1f253a;
            --accent-cyan: #00f2fe;
            --accent-pink: #ff0844;
            --text-main: #ffffff;
            --text-muted: #647393;
            --radius: 12px;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* СЛЕВА: ЛОГОТИП И ПОИСК */
        .sidebar {
            width: 300px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            flex-shrink: 0;
        }
        .logo {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: -1px;
            background: linear-gradient(45deg, var(--accent-cyan), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .search-box { position: relative; width: 100%; }
        .search-box input {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 14px 16px 14px 45px;
            border-radius: 30px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: var(--transition);
        }
        .search-box input:focus { border-color: var(--accent-cyan); box-shadow: 0 0 15px rgba(0, 242, 254, 0.15); }
        .search-box i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }

        /* ОСНОВНАЯ ПАНЕЛЬ */
        .main-content { flex-grow: 1; overflow-y: auto; padding-bottom: 140px; display: flex; flex-direction: column; align-items: center; }

        /* ПО ЦЕНТРУ: ПРОФИЛЬ */
        .profile-container { display: flex; flex-direction: column; align-items: center; text-align: center; margin-top: 40px; margin-bottom: 30px; }
        .avatar-frame { width: 85px; height: 85px; border-radius: 50%; padding: 3px; background: linear-gradient(45deg, var(--accent-pink), var(--accent-cyan)); }
        .avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background: #000; }
        .username { font-size: 22px; font-weight: 800; margin-top: 12px; }
        .stats { display: flex; gap: 20px; margin-top: 6px; font-size: 13px; color: var(--text-muted); }
        .stats span { color: var(--accent-cyan); font-weight: 700; }

        /* ПО ЦЕНТРУ: МЕНЮ НАВИГАЦИИ */
        .center-tabs { display: flex; background: var(--bg-sidebar); border: 1px solid var(--border); padding: 5px; border-radius: 30px; gap: 5px; margin-bottom: 35px; }
        .tab-btn { background: none; border: none; color: var(--text-muted); padding: 10px 22px; font-size: 14px; font-weight: 700; border-radius: 25px; cursor: pointer; transition: var(--transition); display: flex; align-items: center; gap: 8px; }
        .tab-btn:hover { color: #fff; }
        .tab-btn.active { color: #000; background: #fff; box-shadow: 0 4px 12px rgba(255,255,255,0.1); }

        /* СПИСКИ ТРЕКОВ */
        .content-body { width: 100%; max-width: 850px; padding: 0 20px; }
        .view-panel { display: none; }
        .view-panel.active { display: block; }

        .track-list { display: flex; flex-direction: column; gap: 8px; }
        .track-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; background: var(--bg-sidebar); border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; transition: var(--transition); }
        .track-item:hover { border-color: var(--accent-cyan); background: var(--bg-card); }
        .track-item.active { border-color: var(--accent-pink); background: rgba(255, 8, 68, 0.03); }

        .track-left { display: flex; align-items: center; gap: 15px; overflow: hidden; flex-grow: 1; }
        .track-img { width: 44px; height: 44px; border-radius: 6px; object-fit: cover; background: #000; flex-shrink: 0; }
        .track-info { display: flex; flex-direction: column; overflow: hidden; }
        .track-name { font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-author { font-size: 13px; color: var(--text-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .track-right { display: flex; align-items: center; gap: 15px; flex-shrink: 0; }
        .icon-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; transition: var(--transition); padding: 4px; }
        .icon-btn:hover { color: #fff; }
        .icon-btn.active { color: var(--accent-pink); }

        /* ПЛЕЙЛИСТЫ */
        .add-p-btn { width: 100%; background: none; border: 2px dashed var(--border); color: var(--text-muted); padding: 14px; border-radius: var(--radius); cursor: pointer; font-weight: 700; margin-bottom: 20px; transition: var(--transition); }
        .add-p-btn:hover { border-color: var(--accent-cyan); color: #fff; }
        .p-box { background: var(--bg-sidebar); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 15px; overflow: hidden; }
        .p-head { padding: 15px 20px; background: rgba(255,255,255,0.01); border-bottom: 1px solid var(--border); font-size: 16px; font-weight: 700; display: flex; justify-content: space-between; }

        /* НИЖНИЙ ПЛЕЙБАР */
        .bottom-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 110px; background: rgba(11,13,22,0.94); backdrop-filter: blur(25px); border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; z-index: 100; }
        .p-left { width: 25%; display: flex; align-items: center; gap: 15px; overflow: hidden; }
        .p-center { width: 50%; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .p-right { width: 25%; display: flex; align-items: center; justify-content: flex-end; gap: 10px; }

        .master-img { width: 52px; height: 52px; border-radius: 8px; object-fit: cover; background: #000; }
        .master-play { width: 46px; height: 46px; border-radius: 50%; background: #fff; color: #000; border: none; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: var(--transition); }
        .master-play:hover { transform: scale(1.05); }

        .progress-line { display: flex; align-items: center; gap: 12px; width: 100%; max-width: 600px; }
        .range-slider { flex-grow: 1; height: 4px; accent-color: var(--accent-cyan); background: #1f253a; border-radius: 2px; cursor: pointer; outline: none; }
        .time-txt { font-size: 12px; color: var(--text-muted); width: 35px; font-variant-numeric: tabular-nums; }

        /* ЭКВАЛАЙЗЕР НА ЗАДНЕМ ФОНЕ ПЛЕЕРА */
        #bg-eq { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; opacity: 0.15; }

        /* МЕНЮ ДОБАВЛЕНИЯ В ПЛЕЙЛИСТ */
        .drop-menu { position: relative; }
        .drop-list { display: none; position: absolute; right: 0; bottom: 30px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; min-width: 150px; z-index: 200; padding: 5px 0; }
        .drop-list button { background: none; border: none; color: #fff; width: 100%; padding: 8px 12px; text-align: left; cursor: pointer; font-size: 13px; }
        .drop-list button:hover { background: rgba(255,255,255,0.05); color: var(--accent-cyan); }
        .drop-menu.open .drop-list { display: block; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo"><i class="fa-solid fa-dog"></i> МУЗИ ДОГ</div>
        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="global-search" placeholder="Поиск любой песни мира...">
        </div>
    </aside>

    <main class="main-content">
        
        <section class="profile-container">
            <div class="avatar-frame">
                <img src="https://images.unsplash.com/photo-1555066931-4365d14bab8c?w=150&q=80" class="avatar">
            </div>
            <h2 class="username">MuziDog Operator</h2>
            <div class="stats">
                <div>Любимых треков: <span id="cnt-favs">0</span></div>
                <div>Плейлистов: <span id="cnt-play">0</span></div>
            </div>
        </section>

        <nav class="center-tabs">
            <button class="tab-btn active" onclick="toggleTab(event, 'panel-all')"><i class="fa-solid fa-bolt"></i> Треки</button>
            <button class="tab-btn" onclick="toggleTab(event, 'panel-favs')"><i class="fa-solid fa-heart"></i> Избранное</button>
            <button class="tab-btn" onclick="toggleTab(event, 'panel-play')"><i class="fa-solid fa-folder"></i> Плейлисты</button>
            <button class="tab-btn" onclick="toggleTab(event, 'panel-hist')"><i class="fa-solid fa-history"></i> История</button>
        </nav>

        <section class="content-body">
            
            <div id="panel-all" class="view-panel active">
                <div class="track-list" id="list-all"></div>
            </div>

            <div id="panel-favs" class="view-panel">
                <div class="track-list" id="list-favs"></div>
            </div>

            <div id="panel-play" class="view-panel">
                <button class="add-p-btn" onclick="addCustomPlaylist()"><i class="fa-solid fa-plus"></i> Создать новый плейлист</button>
                <div id="list-custom-p"></div>
            </div>

            <div id="panel-hist" class="view-panel">
                <div class="track-list" id="list-hist"></div>
            </div>

        </section>
    </main>

    <footer class="bottom-bar">
        <canvas id="bg-eq"></canvas>

        <div class="p-left">
            <img src="https://placehold.co/100x100/121624/fff?text=Muzi" class="master-img" id="track-cover">
            <div class="track-info">
                <span class="track-name" id="track-title">Плеер пуст</span>
                <span class="track-author" id="track-artist">Введи поисковый запрос слева</span>
            </div>
        </div>

        <div class="p-center">
            <div style="display: flex; align-items: center; gap: 20px;">
                <button class="icon-btn" style="font-size: 18px;" onclick="shiftTrack(-1)"><i class="fa-solid fa-backward-step"></i></button>
                <button class="master-play" id="master-toggle" onclick="playbackControl()"><i class="fa-solid fa-play"></i></button>
                <button class="icon-btn" style="font-size: 18px;" onclick="shiftTrack(1)"><i class="fa-solid fa-forward-step"></i></button>
            </div>
            <div class="progress-line">
                <span class="time-txt" id="time-cur">0:00</span>
                <input type="range" class="range-slider" id="timeline" value="0" max="100" oninput="applyTimeline(this.value)">
                <span class="time-txt" id="time-dur">0:00</span>
            </div>
        </div>

        <div class="p-right">
            <i class="fa-solid fa-volume-low" style="color: var(--text-muted);"></i>
            <input type="range" class="range-slider" id="volume" min="0" max="100" value="80" style="max-width: 80px;" oninput="applyVolume(this.value)">
        </div>
    </footer>

    <script>
        // Стабильное публичное зеркало Invidious API
        const INVIDIOUS_HOST = "https://yewtu.be";

        const audio = new Audio();
        audio.crossOrigin = "anonymous"; // Важно для работы визуализатора частот

        let tracksQueue = [];
        let activeIdx = 0;

        let favStorage = JSON.parse(localStorage.getItem('md_local_fav_list')) || [];
        let playlistStorage = JSON.parse(localStorage.getItem('md_local_playlist_list')) || {};
        let historyStorage = JSON.parse(localStorage.getItem('md_local_hist_list')) || [];

        // Переключение меню по центру
        function toggleTab(e, targetPanel) {
            document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(targetPanel).classList.add('active');
            e.currentTarget.classList.add('active');

            if(targetPanel === 'panel-favs') buildFavorites();
            if(targetPanel === 'panel-play') buildPlaylists();
            if(targetPanel === 'panel-hist') buildHistory();
            refreshCounters();
        }

        // Поиск по всей базе мира через API
        async function universalSearch(query) {
            const listContainer = document.getElementById("list-all");
            listContainer.innerHTML = "<div style='color: var(--text-muted); padding:20px; text-align:center;'>Сканируем мировую базу треков...</div>";
            
            try {
                const res = await fetch(`${INVIDIOUS_HOST}/api/v1/search?q=${encodeURIComponent(query)}&type=video`);
                const results = await res.json();
                
                if(!results || results.length === 0) {
                    listContainer.innerHTML = "<div style='color: var(--text-muted); padding:20px;'>Ничего не найдено. Уточни запрос.</div>";
                    return;
                }

                // Маппим данные под архитектуру плеера
                tracksQueue = results.slice(0, 30).map(v => ({
                    id: v.videoId,
                    title: v.title,
                    artist: v.author,
                    cover: v.videoThumbnails ? v.videoThumbnails.find(t => t.quality === 'medium')?.url || v.videoThumbnails[0].url : 'https://placehold.co/200x200/121624/fff?text=Music',
                    audio: `${INVIDIOUS_HOST}/latest_version?id=${v.videoId}&itag=140&local=true` // local=true активирует прокси для обхода CORS
                }));

                buildMainList();
            } catch (err) {
                listContainer.innerHTML = "<div style='color: var(--accent-pink); padding:20px;'>Ошибка сети. Попробуй снова через пару секунд.</div>";
            }
        }

        function buildMainList() {
            const container = document.getElementById("list-all");
            container.innerHTML = "";
            tracksQueue.forEach((t, i) => container.appendChild(generateTrackRow(t, i, tracksQueue)));
        }

        // Конструктор строки трека
        function generateTrackRow(track, index, queueCtx) {
            const row = document.createElement('div');
            row.className = `track-item ${audio.src === track.audio ? 'active' : ''}`;
            const isLiked = favStorage.some(f => f.id === track.id);

            row.innerHTML = `
                <div class="track-left" onclick="launchTrack(${index}, ${JSON.stringify(queueCtx).replace(/"/g, '&quot;')})">
                    <img src="${track.cover}" class="track-img">
                    <div class="track-info">
                        <div class="track-name">${track.title}</div>
                        <div class="track-author">${track.artist}</div>
                    </div>
                </div>
                <div class="track-right">
                    <button class="icon-btn ${isLiked ? 'active' : ''}" onclick="likeHandler(event, ${JSON.stringify(track).replace(/"/g, '&quot;')})">
                        <i class="fa-${isLiked ? 'solid' : 'regular'} fa-heart"></i>
                    </button>
                    <div class="drop-menu">
                        <button class="icon-btn" onclick="openDropMenu(event)"><i class="fa-solid fa-plus"></i></button>
                        <div class="drop-list">
                            ${Object.keys(playlistStorage).map(pName => `<button onclick="commitToPlaylist(event, '${track.id}', '${pName}')">${pName}</button>`).join('') || '<button disabled style="color:var(--text-muted)">Нет плейлистов</button>'}
                        </div>
                    </div>
                </div>
            `;
            return row;
        }

        function launchTrack(idx, queue) {
            tracksQueue = queue;
            activeIdx = idx;
            const track = tracksQueue[activeIdx];

            document.getElementById("track-title").textContent = track.title;
            document.getElementById("track-artist").textContent = track.artist;
            document.getElementById("track-cover").src = track.cover;

            audio.src = track.audio;
            audio.play().catch(() => {});
            document.getElementById("master-toggle").innerHTML = `<i class="fa-solid fa-pause"></i>`;
            
            startVisualizer();

            // Сохранение истории
            historyStorage = historyStorage.filter(h => h.id !== track.id);
            historyStorage.unshift(track);
            if(historyStorage.length > 30) historyStorage.pop();
            localStorage.setItem('md_local_hist_list', JSON.stringify(historyStorage));

            document.querySelectorAll('.track-item').forEach(r => r.classList.remove('active'));
            event.currentTarget?.closest('.track-item')?.classList.add('active');
        }

        function playbackControl() {
            if(!audio.src) return;
            if(audio.paused) {
                audio.play();
                document.getElementById("master-toggle").innerHTML = `<i class="fa-solid fa-pause"></i>`;
            } else {
                audio.pause();
                document.getElementById("master-toggle").innerHTML = `<i class="fa-solid fa-play"></i>`;
            }
        }

        function shiftTrack(dir) {
            let next = activeIdx + dir;
            if(next >= 0 && next < tracksQueue.length) launchTrack(next, tracksQueue);
        }

        function applyTimeline(val) { if(audio.duration) audio.currentTime = (val / 100) * audio.duration; }
        function applyVolume(val) { audio.volume = val / 100; }

        audio.addEventListener('timeupdate', () => {
            if(!audio.duration) return;
            document.getElementById("timeline").value = (audio.currentTime / audio.duration) * 100;
            document.getElementById("time-cur").textContent = timeParser(audio.currentTime);
            document.getElementById("time-dur").textContent = timeParser(audio.duration);
        });
        audio.addEventListener('ended', () => shiftTrack(1));

        function timeParser(sec) {
            const m = Math.floor(sec / 60); const s = Math.floor(sec % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        // Лайки
        function likeHandler(e, track) {
            e.stopPropagation();
            const exists = favStorage.findIndex(f => f.id === track.id);
            if(exists > -1) favStorage.splice(exists, 1);
            else favStorage.push(track);
            
            localStorage.setItem('md_local_fav_list', JSON.stringify(favStorage));
            refreshCounters();
            
            if(document.getElementById('panel-all').classList.contains('active')) buildMainList();
            if(document.getElementById('panel-favs').classList.contains('active')) buildFavorites();
        }

        function addCustomPlaylist() {
            const name = prompt("Название нового плейлиста:");
            if(!name || name.trim() === "") return;
            if(playlistStorage[name.trim()]) return;
            playlistStorage[name.trim()] = [];
            localStorage.setItem('md_local_playlist_list', JSON.stringify(playlistStorage));
            buildPlaylists();
            refreshCounters();
        }

        function commitToPlaylist(e, trackId, pName) {
            e.stopPropagation();
            if(!playlistStorage[pName].includes(trackId)) {
                playlistStorage[pName].push(trackId);
                localStorage.setItem('md_local_playlist_list', JSON.stringify(playlistStorage));
            }
            document.querySelectorAll('.drop-menu').forEach(d => d.classList.remove('open'));
        }

        // Рендер вкладок
        function buildFavorites() {
            const r = document.getElementById("list-favs"); r.innerHTML = favStorage.length === 0 ? "<div style='color:var(--text-muted); padding:20px;'>Тут пока пусто.</div>" : "";
            favStorage.forEach((t, i) => r.appendChild(generateTrackRow(t, i, favStorage)));
        }
        function buildHistory() {
            const r = document.getElementById("list-hist"); r.innerHTML = historyStorage.length === 0 ? "<div style='color:var(--text-muted); padding:20px;'>История пуста.</div>" : "";
            historyStorage.forEach((t, i) => r.appendChild(generateTrackRow(t, i, historyStorage)));
        }
        function buildPlaylists() {
            const r = document.getElementById("list-custom-p"); r.innerHTML = "";
            const keys = Object.keys(playlistStorage);
            if(keys.length === 0) r.innerHTML = "<div style='color:var(--text-muted); padding:10px 0;'>Плейлистов нет.</div>";
            
            keys.forEach(pName => {
                const box = document.createElement('div');
                box.className = 'p-box';
                box.innerHTML = `<div class="p-head"><span>${pName}</span><span style="color:var(--text-muted); font-size:13px;">${playlistStorage[pName].length} треков</span></div>`;
                
                const subList = document.createElement('div');
                subList.className = 'track-list';
                subList.style.padding = '15px';
                
                // Фильтруем треки, которые сохранены в этом плейлисте (ищем в глобальной истории или фаворитах)
                const combinedMemory = [...favStorage, ...historyStorage, ...tracksQueue];
                const pTracks = playlistStorage[pName].map(id => combinedMemory.find(t => t.id === id)).filter(Boolean);
                
                if(pTracks.length === 0) subList.innerHTML = "<div style='color:var(--text-muted); font-size:13px;'>Плейлист пуст. Добавь треки через '+'</div>";
                pTracks.forEach((t, i) => subList.appendChild(generateTrackRow(t, i, pTracks)));
                
                box.appendChild(subList);
                r.appendChild(box);
            });
        }

        function openDropMenu(e) {
            e.stopPropagation();
            const root = e.currentTarget.parentElement;
            document.querySelectorAll('.drop-menu').forEach(d => { if(d !== root) d.classList.remove('open'); });
            root.classList.toggle('open');
        }

        function refreshCounters() {
            document.getElementById("cnt-favs").textContent = favStorage.length;
            document.getElementById("cnt-play").textContent = Object.keys(playlistStorage).length;
        }

        window.addEventListener('click', () => document.querySelectorAll('.drop-menu').forEach(d => d.classList.remove('open')));

        // Поиск на нажатие Enter
        document.getElementById("global-search").addEventListener("keypress", (e) => {
            if (e.key === "Enter") {
                const q = e.target.value.trim();
                if(q) universalSearch(q);
            }
        });

        // ЭКВАЛАЙЗЕР (ПОТОКОВЫЙ Web Audio API)
        let aCtx, analyser, src, bLen, dArray;
        const canvas = document.getElementById("bg-eq");
        const ctx = canvas.getContext("2d");

        function startVisualizer() {
            if(aCtx) return;
            aCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = aCtx.createAnalyser();
            src = aCtx.createMediaElementSource(audio);
            src.connect(analyser);
            analyser.connect(aCtx.destination);
            analyser.fftSize = 64;
            bLen = analyser.frequencyBinCount;
            dArray = new Uint8Array(bLen);
            
            function loop() {
                requestAnimationFrame(loop);
                analyser.getByteFrequencyData(dArray);
                ctx.clearRect(0,0,canvas.width, canvas.height);
                const step = canvas.width / bLen;
                for(let i=0; i<bLen; i++) {
                    const h = (dArray[i]/255) * canvas.height * 0.8;
                    ctx.fillStyle = `rgba(0, 242, 254, ${dArray[i]/255})`;
                    ctx.fillRect(i*step, canvas.height - h, step - 3, h);
                }
            }
            function resize() { canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight; }
            window.addEventListener('resize', resize);
            resize();
            loop();
        }

        // Стартовый дефолтный пак музыки при запуске
        universalSearch("lofi coding synthwave");
        refreshCounters();
    </script>
