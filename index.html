<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MuziDog Custom OS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #07080c;
            --bg-panel: #0d0f17;
            --bg-card: #131723;
            --border: #1e2336;
            --accent-cyan: #00f2fe;
            --accent-pink: #ff0844;
            --text-main: #ffffff;
            --text-muted: #626d85;
            --radius: 12px;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* ОСНОВНОЙ КОНТЕЙНЕР С КРУЧЕНЫМ СКРОЛЛОМ */
        .app-container { flex-grow: 1; overflow-y: auto; padding-bottom: 140px; display: flex; flex-direction: column; align-items: center; }

        /* БЛОК ПРОФИЛЯ ПО ЦЕНТРУ */
        .profile-section { display: flex; flex-direction: column; align-items: center; text-align: center; margin-top: 40px; margin-bottom: 30px; width: 100%; max-width: 800px; padding: 0 20px; }
        .avatar-wrapper { position: relative; width: 90px; height: 90px; border-radius: 50%; padding: 3px; background: linear-gradient(45deg, var(--accent-cyan), var(--accent-pink)); box-shadow: 0 0 20px rgba(0, 242, 254, 0.3); }
        .avatar { width: 100%; height: 100%; border-radius: 50%; background: #222; object-fit: cover; }
        .profile-name { font-size: 24px; font-weight: 800; margin-top: 15px; letter-spacing: -0.5px; }
        .profile-stats { display: flex; gap: 20px; margin-top: 8px; font-size: 13px; color: var(--text-muted); }
        .stat-item span { color: var(--accent-cyan); font-weight: 700; }

        /* МЕНЮ ПО СЕРЕДИНЕ */
        .center-menu { display: flex; background: var(--bg-panel); border: 1px solid var(--border); padding: 6px; border-radius: 30px; gap: 5px; margin-bottom: 40px; }
        .menu-tab { background: none; border: none; color: var(--text-muted); padding: 10px 24px; font-size: 14px; font-weight: 700; border-radius: 25px; cursor: pointer; transition: var(--transition); display: flex; align-items: center; gap: 8px; }
        .menu-tab:hover { color: #fff; }
        .menu-tab.active { color: #000; background: #fff; box-shadow: 0 4px 12px rgba(255,255,255,0.15); }

        /* КОНТЕНТНЫЕ СЕКЦИИ */
        .content-body { width: 100%; max-width: 900px; padding: 0 30px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* ИНТЕРФЕЙС ТРЕКОВ И СПИСКОВ */
        .tracks-list { display: flex; flex-direction: column; gap: 8px; }
        .track-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; background: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; transition: var(--transition); }
        .track-row:hover { border-color: var(--accent-cyan); background: var(--bg-card); transform: translateY(-1px); }
        .track-row.playing { border-color: var(--accent-pink); background: rgba(255, 8, 68, 0.04); }
        
        .track-left { display: flex; align-items: center; gap: 15px; overflow: hidden; flex-grow: 1; }
        .track-cover { width: 44px; height: 44px; border-radius: 6px; object-fit: cover; background: #000; flex-shrink: 0; }
        .track-meta { display: flex; flex-direction: column; overflow: hidden; }
        .track-title { font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-artist { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

        .track-actions { display: flex; align-items: center; gap: 15px; flex-shrink: 0; }
        .action-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; transition: var(--transition); padding: 5px; }
        .action-btn:hover { color: #fff; }
        .action-btn.liked { color: var(--accent-pink); }

        /* КНОПКА СОЗДАНИЯ ПЛЕЙЛИСТА */
        .create-playlist-btn { width: 100%; background: none; border: 2px dashed var(--border); color: var(--text-muted); padding: 15px; border-radius: var(--radius); cursor: pointer; font-weight: 700; margin-bottom: 20px; transition: var(--transition); text-align: center; }
        .create-playlist-btn:hover { border-color: var(--accent-cyan); color: #fff; }

        .playlist-block { background: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 15px; overflow: hidden; }
        .playlist-header { display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; background: rgba(255,255,255,0.01); border-bottom: 1px solid var(--border); }

        /* НИЖНИЙ ПЛЕЙБАР */
        .player-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 110px; background: rgba(13,15,23,0.92); backdrop-filter: blur(20px); border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; z-index: 100; }
        .player-left { width: 25%; display: flex; align-items: center; gap: 15px; overflow: hidden; }
        .player-center { width: 50%; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .player-right { width: 25%; display: flex; align-items: center; justify-content: flex-end; gap: 12px; }
        
        .master-cover { width: 52px; height: 52px; border-radius: 8px; object-fit: cover; background: #000; }
        .master-play { width: 48px; height: 48px; border-radius: 50%; background: #fff; color: #000; border: none; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: var(--transition); }
        .master-play:hover { transform: scale(1.05); }

        .progress-block { display: flex; align-items: center; gap: 15px; width: 100%; max-width: 600px; }
        .slider { flex-grow: 1; height: 4px; accent-color: var(--accent-cyan); background: #202536; border-radius: 2px; cursor: pointer; outline: none; }
        .time-lbl { font-size: 12px; color: var(--text-muted); width: 40px; font-variant-numeric: tabular-nums; }

        /* АНАЛИЗАТОР СПЕКТРА (ЗАДНИЙ ФОН ПЛЕЕРА) */
        #visualizer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; opacity: 0.12; }

        /* ВСПЛЫВАЮЩЕЕ МЕНЮ ДОБАВЛЕНИЯ В ПЛЕЙЛИСТ */
        .dropdown { position: relative; }
        .dropdown-content { display: none; position: absolute; right: 0; bottom: 30px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; min-width: 160px; z-index: 200; box-shadow: 0 10px 25px rgba(0,0,0,0.5); padding: 5px 0; }
        .dropdown-content button { background: none; border: none; color: #fff; width: 100%; padding: 10px 15px; text-align: left; cursor: pointer; font-size: 13px; }
        .dropdown-content button:hover { background: rgba(255,255,255,0.05); color: var(--accent-cyan); }
        .dropdown.active .dropdown-content { display: block; }
    </style>
</head>
<body>

    <main class="app-container">
        
        <section class="profile-section">
            <div class="avatar-wrapper">
                <img src="https://placehold.co/150x150/ff0844/fff?text=DEV" class="avatar">
            </div>
            <h1 class="profile-name">MuziDog Local Client</h1>
            <div class="profile-stats">
                <div class="stat-item">Любимых треков: <span id="stat-favs">0</span></div>
                <div class="stat-item">Плейлистов: <span id="stat-playlists">0</span></div>
            </div>
        </section>

        <nav class="center-menu">
            <button class="menu-tab active" onclick="switchTab(event, 'tab-all')"><i class="fa-solid fa-music"></i> Все треки</button>
            <button class="menu-tab" onclick="switchTab(event, 'tab-favs')"><i class="fa-solid fa-heart"></i> Избранное</button>
            <button class="menu-tab" onclick="switchTab(event, 'tab-playlists')"><i class="fa-solid fa-layer-group"></i> Плейлисты</button>
            <button class="menu-tab" onclick="switchTab(event, 'tab-history')"><i class="fa-solid fa-history"></i> История</button>
        </nav>

        <section class="content-body">
            
            <div id="tab-all" class="tab-content active">
                <div class="tracks-list" id="all-tracks-root"></div>
            </div>

            <div id="tab-favs" class="tab-content">
                <div class="tracks-list" id="fav-tracks-root"></div>
            </div>

            <div id="tab-playlists" class="tab-content">
                <button class="create-playlist-btn" onclick="createNewPlaylist()"><i class="fa-solid fa-plus"></i> Создать новый плейлист</button>
                <div id="playlists-root"></div>
            </div>

            <div id="tab-history" class="tab-content">
                <div class="tracks-list" id="history-tracks-root"></div>
            </div>

        </section>
    </main>

    <footer class="player-bar">
        <canvas id="visualizer"></canvas>

        <div class="player-left">
            <img src="https://placehold.co/100x100/131723/fff?text=Muzi" class="master-cover" id="p-cover">
            <div class="track-meta">
                <span class="track-title" id="p-title">Плеер пуст</span>
                <span class="track-artist" id="p-artist">Выбери трек</span>
            </div>
        </div>

        <div class="player-center">
            <div style="display: flex; align-items: center; gap: 18px;">
                <button class="action-btn" style="font-size: 18px;" onclick="prevTrack()"><i class="fa-solid fa-backward-step"></i></button>
                <button class="master-play" id="p-play-btn" onclick="togglePlay()"><i class="fa-solid fa-play"></i></button>
                <button class="action-btn" style="font-size: 18px;" onclick="nextTrack()"><i class="fa-solid fa-forward-step"></i></button>
            </div>
            <div class="progress-block">
                <span class="time-lbl" id="p-current">0:00</span>
                <input type="range" class="slider" id="p-slider" value="0" max="100" oninput="seekTrack(this.value)">
                <span class="time-lbl" id="p-total">0:00</span>
            </div>
        </div>

        <div class="player-right">
            <i class="fa-solid fa-volume-high" style="color: var(--text-muted);"></i>
            <input type="range" class="slider" id="p-volume" min="0" max="100" value="80" style="max-width: 90px;" oninput="setVolume(this.value)">
        </div>
    </footer>

    <script>
        // БАЗОВАЯ ЛОКАЛЬНАЯ БИБЛИОТЕКА (Все варианты музыки сразу на борту)
        const LOCAL_LIBRARY = [
            { id: "tr-1", title: "Cyberpunk Street Drive", artist: "Synthwave Engine", cover: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=200&q=80", audio: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
            { id: "tr-2", title: "Phonk Drift Injection", artist: "Kordhell Vibes", cover: "https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=200&q=80", audio: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" },
            { id: "tr-3", title: "Lo-Fi Coding Sessions", artist: "Chillhop Developer", cover: "https://images.unsplash.com/photo-1508700115892-45ecd05ae2ad?w=200&q=80", audio: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" },
            { id: "tr-4", title: "Neon Tokyo Night", artist: "Retrowave Corp", cover: "https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=200&q=80", audio: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3" },
            { id: "tr-5", title: "Dark Horizon Bash", artist: "Industrial Machine", cover: "https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=200&q=80", audio: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3" },
            { id: "tr-6", title: "Vibecoding Midnight", artist: "Binary Beats", cover: "https://images.unsplash.com/photo-1504280390367-361c6d9f38f4?w=200&q=80", audio: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3" }
        ];

        const audio = new Audio();
        audio.crossOrigin = "anonymous";

        let currentQueue = [...LOCAL_LIBRARY];
        let currentIndex = 0;

        let favorites = JSON.parse(localStorage.getItem('m_local_favs')) || [];
        let playlists = JSON.parse(localStorage.getItem('m_local_playlists')) || {};
        let historyList = JSON.parse(localStorage.getItem('m_local_hist')) || [];

        // Переключение меню по середине
        function switchTab(e, tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.menu-tab').forEach(t => t.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            e.currentTarget.classList.add('active');

            if(tabId === 'tab-favs') renderFavorites();
            if(tabId === 'tab-playlists') renderPlaylists();
            if(tabId === 'tab-history') renderHistory();
            updateStats();
        }

        // Рендеринг строк треков
        function createTrackRow(track, queueContext) {
            const row = document.createElement('div');
            row.className = `track-row ${audio.src === track.audio ? 'playing' : ''}`;
            const isLiked = favorites.includes(track.id);

            row.innerHTML = `
                <div class="track-left" onclick="playTrackById('${track.id}', ${JSON.stringify(queueContext).replace(/"/g, '&quot;')})">
                    <img src="${track.cover}" class="track-cover">
                    <div class="track-meta">
                        <div class="track-title">${track.title}</div>
                        <div class="track-artist">${track.artist}</div>
                    </div>
                </div>
                <div class="track-actions">
                    <button class="action-btn ${isLiked ? 'liked' : ''}" onclick="toggleLike('${track.id}')">
                        <i class="fa-${isLiked ? 'solid' : 'regular'} fa-heart"></i>
                    </button>
                    <div class="dropdown">
                        <button class="action-btn" onclick="toggleDropdown(event)"><i class="fa-solid fa-plus"></i></button>
                        <div class="dropdown-content">
                            ${Object.keys(playlists).map(pName => `<button onclick="addToPlaylist('${track.id}', '${pName}')">${pName}</button>`).join('') || '<button disabled>Нет плейлистов</button>'}
                        </div>
                    </div>
                </div>
            `;
            return row;
        }

        function playTrackById(id, queue) {
            currentQueue = queue;
            currentIndex = currentQueue.findIndex(t => t.id === id);
            const track = currentQueue[currentIndex];

            document.getElementById("p-title").textContent = track.title;
            document.getElementById("p-artist").textContent = track.artist;
            document.getElementById("p-cover").src = track.cover;

            audio.src = track.audio;
            audio.play().catch(() => {});
            document.getElementById("p-play-btn").innerHTML = `<i class="fa-solid fa-pause"></i>`;
            
            initVisualizer();

            // Логика истории
            historyList = historyList.filter(tid => tid !== id);
            historyList.unshift(id);
            localStorage.setItem('m_local_hist', JSON.stringify(historyList));

            // Обновляем маркеры проигрываемого трека по всему интерфейсу
            document.querySelectorAll('.track-row').forEach(r => r.classList.remove('playing'));
            event.currentTarget?.closest('.track-row')?.classList.add('playing');
        }

        function togglePlay() {
            if(!audio.src) return;
            if(audio.paused) {
                audio.play();
                document.getElementById("p-play-btn").innerHTML = `<i class="fa-solid fa-pause"></i>`;
            } else {
                audio.pause();
                document.getElementById("p-play-btn").innerHTML = `<i class="fa-solid fa-play"></i>`;
            }
        }

        function nextTrack() { if(currentIndex + 1 < currentQueue.length) playTrackById(currentQueue[currentIndex+1].id, currentQueue); }
        function prevTrack() { if(currentIndex - 1 >= 0) playTrackById(currentQueue[currentIndex-1].id, currentQueue); }
        function seekTrack(val) { if(audio.duration) audio.currentTime = (val / 100) * audio.duration; }
        function setVolume(val) { audio.volume = val / 100; }

        audio.addEventListener('timeupdate', () => {
            if(!audio.duration) return;
            document.getElementById("p-slider").value = (audio.currentTime / audio.duration) * 100;
            document.getElementById("p-current").textContent = formatTime(audio.currentTime);
            document.getElementById("p-total").textContent = formatTime(audio.duration);
        });
        audio.addEventListener('ended', nextTrack);

        function formatTime(s) {
            const m = Math.floor(s / 60); const sec = Math.floor(s % 60);
            return `${m}:${sec < 10 ? '0' : ''}${sec}`;
        }

        // Лайки / Избранное
        function toggleLike(id) {
            if(favorites.includes(id)) favorites = favorites.filter(f => f !== id);
            else favorites.push(id);
            localStorage.setItem('m_local_favs', JSON.stringify(favorites));
            updateStats();
            
            // Быстрый перерендер текущей открытой вкладки
            if(document.getElementById('tab-all').classList.contains('active')) renderAllTracks();
            if(document.getElementById('tab-favs').classList.contains('active')) renderFavorites();
        }

        // Плейлисты (Локальный менеджмент)
        function createNewPlaylist() {
            const name = prompt("Введите название нового плейлиста:");
            if(!name || name.trim() === "") return;
            if(playlists[name.trim()]) return alert("Такой плейлист уже существует!");
            playlists[name.trim()] = [];
            localStorage.setItem('m_local_playlists', JSON.stringify(playlists));
            renderPlaylists();
            renderAllTracks();
            updateStats();
        }

        function addToPlaylist(trackId, playlistName) {
            if(!playlists[playlistName].includes(trackId)) {
                playlists[playlistName].push(trackId);
                localStorage.setItem('m_local_playlists', JSON.stringify(playlists));
                alert(`Добавлено в плейлист "${playlistName}"`);
            }
            document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('active'));
        }

        // РЕНДЕР ТАБОВ
        function renderAllTracks() {
            const root = document.getElementById("all-tracks-root"); root.innerHTML = "";
            LOCAL_LIBRARY.forEach(t => root.appendChild(createTrackRow(t, LOCAL_LIBRARY)));
        }
        function renderFavorites() {
            const root = document.getElementById("fav-tracks-root"); root.innerHTML = "";
            const favTracks = LOCAL_LIBRARY.filter(t => favorites.includes(t.id));
            if(favTracks.length === 0) root.innerHTML = '<div style="color:var(--text-muted); text-align:center; padding:20px;">Нет любимых треков. Нажми на сердечко!</div>';
            favTracks.forEach(t => root.appendChild(createTrackRow(t, favTracks)));
        }
        function renderHistory() {
            const root = document.getElementById("history-tracks-root"); root.innerHTML = "";
            const histTracks = historyList.map(id => LOCAL_LIBRARY.find(t => t.id === id)).filter(Boolean);
            if(histTracks.length === 0) root.innerHTML = '<div style="color:var(--text-muted); text-align:center; padding:20px;">Вы еще ничего не слушали.</div>';
            histTracks.forEach(t => root.appendChild(createTrackRow(t, histTracks)));
        }
        function renderPlaylists() {
            const root = document.getElementById("playlists-root"); root.innerHTML = "";
            const keys = Object.keys(playlists);
            if(keys.length === 0) root.innerHTML = '<div style="color:var(--text-muted); text-align:center; padding:10px 0;">Создайте свой первый кастомный список треков выше.</div>';
            keys.forEach(pName => {
                const block = document.createElement('div');
                block.className = 'playlist-block';
                block.innerHTML = `<div class="playlist-header"><h3 style="font-size:16px;">${pName}</h3><span style="font-size:13px; color:var(--text-muted);">${playlists[pName].length} треков</span></div>`;
                
                const listContainer = document.createElement('div');
                listContainer.className = 'tracks-list';
                listContainer.style.padding = '15px';
                
                const pTracks = LOCAL_LIBRARY.filter(t => playlists[pName].includes(t.id));
                if(pTracks.length === 0) listContainer.innerHTML = '<div style="color:var(--text-muted); font-size:13px;">Плейлист пуст. Добавьте треки через меню кнопки "+"</div>';
                pTracks.forEach(t => listContainer.appendChild(createTrackRow(t, pTracks)));
                
                block.appendChild(listContainer);
                root.appendChild(block);
            });
        }

        function toggleDropdown(e) {
            e.stopPropagation();
            const currentDd = e.currentTarget.parentElement;
            document.querySelectorAll('.dropdown').forEach(d => { if(d !== currentDd) d.classList.remove('active'); });
            currentDd.classList.toggle('active');
        }

        function updateStats() {
            document.getElementById("stat-favs").textContent = favorites.length;
            document.getElementById("stat-playlists").textContent = Object.keys(playlists).length;
        }

        window.addEventListener('click', () => document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('active')));

        // АНАЛИЗАТОР ЗВУКА НА ЗАДНЕМ ФОНЕ ПЛЕЕРА
        let audioCtx, analyser, srcNode, bufferLength, dataArray;
        const canvas = document.getElementById("visualizer");
        const ctx = canvas.getContext("2d");

        function initVisualizer() {
            if(audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            srcNode = audioCtx.createMediaElementSource(audio);
            srcNode.connect(analyser);
            analyser.connect(audioCtx.destination);
            analyser.fftSize = 64;
            bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);
            
            function draw() {
                requestAnimationFrame(draw);
                analyser.getByteFrequencyData(dataArray);
                ctx.clearRect(0,0,canvas.width, canvas.height);
                const barWidth = canvas.width / bufferLength;
                for(let i=0; i<bufferLength; i++) {
                    const h = (dataArray[i]/255) * canvas.height;
                    ctx.fillStyle = `rgba(0, 242, 254, ${dataArray[i]/255})`;
                    ctx.fillRect(i*barWidth, canvas.height - h, barWidth - 2, h);
                }
            }
            function resize() { canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight; }
            window.addEventListener('resize', resize);
            resize();
            draw();
        }

        // Первичный запуск движка
        renderAllTracks();
        updateStats();
    </script>
</body>
</html>
