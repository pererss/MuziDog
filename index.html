<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MuziDog YouTube Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #060608;
            --bg-sidebar: #0d0e12;
            --bg-card: #13151b;
            --border: #1f222c;
            --text-main: #ffffff;
            --text-muted: #6e7382;
            --accent: #00ffcc;
            --accent-gradient: linear-gradient(45deg, #00ffcc, #ff0055);
            --radius: 12px;
            --transition: all 0.25s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* САЙДБАР */
        .sidebar { width: 260px; background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 25px; justify-content: space-between; }
        .logo { font-size: 28px; font-weight: 900; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 35px; display: flex; align-items: center; gap: 10px; }
        .nav-btn { background: none; border: none; color: var(--text-muted); text-align: left; padding: 14px 18px; border-radius: var(--radius); font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
        .nav-btn.active { color: var(--text-main); background: var(--bg-card); border-left: 4px solid var(--accent); }

        /* ОСНОВНАЯ ПАНЕЛЬ */
        .main-panel { flex-grow: 1; display: flex; flex-direction: column; overflow-y: auto; padding-bottom: 120px; }
        .header-sticky { position: sticky; top: 0; background: var(--bg-main); padding: 30px 40px 15px 40px; z-index: 5; }
        .search-wrapper { position: relative; width: 100%; max-width: 700px; }
        .search-input { width: 100%; background: var(--bg-card); border: 1px solid var(--border); border-radius: 30px; padding: 16px 25px 16px 55px; color: #fff; font-size: 16px; outline: none; transition: var(--transition); }
        .search-input:focus { border-color: var(--accent); }
        .search-wrapper i { position: absolute; left: 22px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 18px; }

        .content { padding: 20px 40px; }
        .section-title { font-size: 24px; font-weight: 700; margin-bottom: 25px; }
        
        /* СЕТКА С ТРЕКАМИ */
        .grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 25px; }
        .music-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; cursor: pointer; transition: var(--transition); }
        .music-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .music-card img { width: 100%; aspect-ratio: 1; border-radius: 8px; object-fit: cover; margin-bottom: 14px; }
        .card-title { font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-artist { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

        /* ВОЛНА */
        .wave-box { background: #0d0e12; border: 1px solid var(--border); padding: 30px; border-radius: 20px; margin-bottom: 40px; position: relative; overflow: hidden; height: 140px; }
        #visualizer { position: absolute; bottom: 0; left: 0; width: 100%; height: 80px; pointer-events: none; opacity: 0.7; }

        /* НИЖНИЙ ПЛЕЙБАР */
        .player-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 100px; background: rgba(13,14,18,0.95); backdrop-filter: blur(10px); border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; z-index: 100; }
        .player-left { width: 30%; display: flex; align-items: center; gap: 15px; }
        .player-center { width: 40%; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .player-right { width: 30%; display: flex; align-items: center; justify-content: flex-end; }
        
        .row-img { width: 50px; height: 50px; border-radius: 6px; object-fit: cover; }
        .row-info { display: flex; flex-direction: column; overflow: hidden; width: 100%; }
        .row-title { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .row-artist { font-size: 13px; color: var(--text-muted); }

        .btn-control { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 20px; transition: var(--transition); padding: 10px; }
        .btn-control:hover { color: #fff; transform: scale(1.1); }
        .play-master { width: 50px; height: 50px; border-radius: 50%; background: #fff; color: #000; border: none; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        .progress-block { display: flex; align-items: center; gap: 15px; width: 100%; }
        .slider { flex-grow: 1; height: 4px; accent-color: var(--accent); background: #252836; border-radius: 2px; cursor: pointer; outline: none; }
        .time-label { font-size: 12px; color: var(--text-muted); width: 45px; }

        /* СКРЫТЫЙ КОНТЕЙНЕР ДЛЯ YOUTUBE IFRAME */
        #yt-hidden-player { position: absolute; top: -9999px; left: -9999px; width: 200px; height: 200px; pointer-events: none; }
    </style>
</head>
<body>

    <!-- Скрытый плеер самого YouTube -->
    <div id="yt-hidden-player"></div>

    <aside class="sidebar">
        <div>
            <div class="logo"><i class="fa-solid fa-dog"></i> MuziDog</div>
            <button class="nav-btn active"><i class="fa-solid fa-house"></i> Главная</button>
        </div>
        <div style="font-size: 12px; color: var(--text-muted);"><i class="fa-solid fa-shield-halved"></i> YouTube Core API</div>
    </aside>

    <main class="main-panel">
        <div class="header-sticky">
            <div class="search-wrapper">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" class="search-input" id="search-input" placeholder="Введите название любого трека или исполнителя...">
            </div>
        </div>

        <div class="content">
            <div class="wave-box">
                <h3 style="position:relative; z-index:2;">Процедурный Вайб-Визуализатор</h3>
                <p style="color: var(--text-muted); font-size: 14px; position:relative; z-index:2;">Синхронизирован с движком вещания</p>
                <canvas id="visualizer"></canvas>
            </div>

            <h2 class="section-title" id="content-title">Популярные треки</h2>
            <div class="grid-layout" id="music-grid"></div>
        </div>
    </main>

    <footer class="player-bar">
        <div class="player-left">
            <img src="https://placehold.co/100x100/13151b/fff?text=Muzi" class="row-img" id="track-cover">
            <div class="row-info">
                <span class="row-title" id="track-title">Ждем выбора</span>
                <span class="row-artist" id="track-artist">MuziDog Stream</span>
            </div>
        </div>

        <div class="player-center">
            <div style="display: flex; align-items: center; gap: 20px;">
                <button class="btn-control" id="prev-btn"><i class="fa-solid fa-backward-step"></i></button>
                <button class="play-master" id="play-btn"><i class="fa-solid fa-play"></i></button>
                <button class="btn-control" id="next-btn"><i class="fa-solid fa-forward-step"></i></button>
            </div>
            <div class="progress-block">
                <span class="time-label" id="time-current">0:00</span>
                <input type="range" class="slider" id="progress-slider" value="0" max="100">
                <span class="time-label" id="time-total">0:00</span>
            </div>
        </div>

        <div class="player-right">
            <i class="fa-solid fa-volume-high" style="color: var(--text-muted); margin-right: 10px;"></i>
            <input type="range" class="slider" id="volume-slider" min="0" max="100" value="70" style="max-width: 100px;">
        </div>
    </footer>

    <!-- Подгружаем официальный скрипт YouTube -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let ytPlayer = null;
        let currentQueue = [];
        let currentIndex = 0;
        let progressTimer = null;

        // Инициализация плеера YouTube, когда скрипт загрузится
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('yt-hidden-player', {
                height: '200',
                width: '200',
                playerVars: {
                    'controls': 0,
                    'disablekb': 1,
                    'fieldname': 'search'
                },
                events: {
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        // Следим за статусом воспроизведения
        function onPlayerStateChange(event) {
            const playBtn = document.getElementById("play-btn");
            if (event.data === YT.PlayerState.PLAYING) {
                playBtn.innerHTML = `<i class="fa-solid fa-pause"></i>`;
                startProgressLoop();
                isCurrentPlaying = true; 
            } else {
                playBtn.innerHTML = `<i class="fa-solid fa-play"></i>`;
                clearInterval(progressTimer);
                isCurrentPlaying = false;
            }

            // Если трек закончился — включаем следующий
            if (event.data === YT.PlayerState.ENDED) {
                nextTrack();
            }
        }

        // Глобальный поиск через стабильный API iTunes
        async function searchMusic(query) {
            const grid = document.getElementById("music-grid");
            grid.innerHTML = "<div style='color: var(--text-muted)'>Ищем по базам данных...</div>";
            
            try {
                const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&media=music&limit=20`);
                const data = await res.json();
                
                if(!data.results || data.results.length === 0) {
                    grid.innerHTML = "<div style='color: var(--text-muted)'>Ничего не найдено.</div>";
                    return;
                }

                currentQueue = data.results.map(track => ({
                    title: track.trackName,
                    artist: track.artistName,
                    cover: track.artworkUrl100.replace('100x100bb', '400x400bb')
                }));

                renderGrid();
            } catch (e) {
                grid.innerHTML = "<div style='color: #ff0055'>Ошибка сети. Перепроверь подключение.</div>";
            }
        }

        function renderGrid() {
            const grid = document.getElementById("music-grid");
            grid.innerHTML = "";
            
            currentQueue.forEach((track, idx) => {
                const card = document.createElement("div");
                card.className = "music-card";
                card.innerHTML = `
                    <img src="${track.cover}" alt="cover">
                    <div class="card-title">${track.title}</div>
                    <div class="card-artist">${track.artist}</div>
                `;
                card.addEventListener("click", () => playTrack(idx));
                grid.appendChild(card);
            });
        }

        // Запуск трека через поисковый механизм YouTube Iframe
        function playTrack(idx) {
            if (idx < 0 || idx >= currentQueue.length || !ytPlayer) return;
            currentIndex = idx;
            const track = currentQueue[idx];

            document.getElementById("track-title").textContent = track.title;
            document.getElementById("track-artist").textContent = track.artist;
            document.getElementById("track-cover").src = track.cover;

            // Магия: заставляем YouTube искать видео по названию и играть первую строчку результатов
            const searchQuery = `${track.artist} ${track.title}`;
            ytPlayer.loadPlaylist({
                listType: 'search',
                list: searchQuery,
                index: 0
            });
        }

        // Управление прогрессом трека
        function startProgressLoop() {
            clearInterval(progressTimer);
            progressTimer = setInterval(() => {
                if (!ytPlayer || typeof ytPlayer.getCurrentTime !== 'function') return;
                
                const current = ytPlayer.getCurrentTime();
                const total = ytPlayer.getDuration();
                
                if (total > 0) {
                    document.getElementById("progress-slider").value = (current / total) * 100;
                    document.getElementById("time-current").textContent = formatTime(current);
                    document.getElementById("time-total").textContent = formatTime(total);
                }
            }, 1000);
        }

        document.getElementById("progress-slider").addEventListener("input", (e) => {
            if (!ytPlayer || !ytPlayer.getDuration()) return;
            const newTime = (e.target.value / 100) * ytPlayer.getDuration();
            ytPlayer.seekTo(newTime, true);
        });

        // Кнопки управления
        const playBtn = document.getElementById("play-btn");
        playBtn.addEventListener("click", () => {
            if (!ytPlayer) return;
            const state = ytPlayer.getPlayerState();
            if (state === YT.PlayerState.PLAYING) {
                ytPlayer.pauseVideo();
            } else {
                ytPlayer.playVideo();
            }
        });

        function nextTrack() { if (currentIndex + 1 < currentQueue.length) playTrack(currentIndex + 1); }
        function prevTrack() { if (currentIndex - 1 >= 0) playTrack(currentIndex - 1); }

        document.getElementById("next-btn").addEventListener("click", nextTrack);
        document.getElementById("prev-btn").addEventListener("click", prevTrack);
        
        document.getElementById("volume-slider").addEventListener("input", (e) => {
            if (ytPlayer && typeof ytPlayer.setVolume === 'function') ytPlayer.setVolume(e.target.value);
        });

        // Обработка поисковой строки
        document.getElementById("search-input").addEventListener("keypress", (e) => {
            if (e.key === "Enter") {
                const q = e.target.value.trim();
                if (q) {
                    document.getElementById("content-title").textContent = `Результаты для "${q}"`;
                    searchMusic(q);
                }
            }
        });

        function formatTime(time) {
            const mins = Math.floor(time / 60);
            const secs = Math.floor(time % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        // ПРОЦЕДУРНЫЙ НЕОНОВЫЙ ВИЗУАЛИЗАТОР
        const canvas = document.getElementById("visualizer");
        const ctx = canvas.getContext("2d");
        let isCurrentPlaying = false;
        let waveData = Array(30).fill(0);

        function drawVisualizer() {
            requestAnimationFrame(drawVisualizer);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const barWidth = canvas.width / waveData.length;
            
            for (let i = 0; i < waveData.length; i++) {
                if (isCurrentPlaying) {
                    // Генерируем красивую псевдо-частоту, если музыка играет
                    waveData[i] += (Math.random() * 15 - 7.5);
                    waveData[i] = Math.max(10, Math.min(waveData[i], 70));
                } else {
                    // Медленно гасим волны на паузе
                    waveData[i] *= 0.9;
                }

                ctx.fillStyle = `rgba(0, 255, 204, ${waveData[i] / 90 + 0.1})`;
                ctx.fillRect(i * barWidth, canvas.height - waveData[i], barWidth - 3, waveData[i]);
            }
        }

        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = 80;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        drawVisualizer();

        // Стартовые треки по умолчанию
        searchMusic("lofi chill");
    </script>
</body>
</html>
