<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUZIDOG</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #060913;
            --bg-sidebar: #0c0f1d;
            --bg-card: #14192d;
            --border: #222943;
            --accent: #00f2fe;
            --pink: #ff0844;
            --text: #ffffff;
            --muted: #6b7a9f;
            --radius: 10px;
            --transition: all 0.2s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-main); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* ЛЕВАЯ ПАНЕЛЬ С БУРГЕРОМ */
        .sidebar {
            width: 280px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            transition: var(--transition);
            z-index: 10;
            flex-shrink: 0;
        }
        .sidebar.collapsed { width: 70px; padding: 25px 12px; }
        
        .sidebar-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .logo {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -0.5px;
            background: linear-gradient(45deg, var(--accent), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: var(--transition);
        }
        .sidebar.collapsed .logo { display: none; }
        
        .burger-btn { background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; padding: 5px; }
        .burger-btn:hover { color: var(--accent); }

        /* ПОИСК ВНУТРИ ПАНЕЛИ */
        .search-wrapper { position: relative; width: 100%; }
        .search-wrapper input {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 12px 12px 12px 40px;
            border-radius: var(--radius);
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: var(--transition);
        }
        .search-wrapper input:focus { border-color: var(--accent); }
        .search-wrapper i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); }
        .sidebar.collapsed .search-wrapper { display: none; }

        /* НАВИГАЦИЯ СЛЕВА */
        .nav-menu { display: flex; flex-direction: column; gap: 5px; margin-top: 10px; }
        .nav-item {
            background: none;
            border: none;
            color: var(--muted);
            padding: 12px 15px;
            font-size: 14px;
            font-weight: 700;
            border-radius: var(--radius);
            cursor: pointer;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: var(--transition);
        }
        .nav-item:hover { color: #fff; background: rgba(255,255,255,0.02); }
        .nav-item.active { color: #000; background: #fff; }
        .sidebar.collapsed .nav-item span { display: none; }
        .sidebar.collapsed .nav-item { justify-content: center; padding: 12px 0; }

        /* ОСНОВНОЙ КОНТЕНТ */
        .main-view { flex-grow: 1; overflow-y: auto; padding: 30px 40px 140px 40px; display: flex; flex-direction: column; }
        .view-pane { display: none; }
        .view-pane.active { display: block; }
        .pane-title { font-size: 22px; font-weight: 800; margin-bottom: 20px; }

        /* СПИСОК ТРЕКОВ */
        .track-grid { display: flex; flex-direction: column; gap: 8px; }
        .track-card { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; background: var(--bg-sidebar); border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; transition: var(--transition); }
        .track-card:hover { border-color: var(--accent); background: var(--bg-card); }
        .track-card.active { border-color: var(--pink); background: rgba(255, 8, 64, 0.03); }

        .track-details { display: flex; align-items: center; gap: 15px; overflow: hidden; flex-grow: 1; }
        .track-art { width: 44px; height: 44px; border-radius: 6px; object-fit: cover; background: #000; flex-shrink: 0; }
        .track-text { display: flex; flex-direction: column; overflow: hidden; }
        .track-title { font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-artist { font-size: 13px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .track-controls { display: flex; align-items: center; gap: 15px; flex-shrink: 0; }
        .action-icon { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; transition: var(--transition); padding: 4px; }
        .action-icon:hover { color: #fff; }
        .action-icon.active { color: var(--pink); }

        /* КНОПКИ ПЛЕЙЛИСТОВ */
        .playlist-trigger { width: 100%; background: none; border: 2px dashed var(--border); color: var(--muted); padding: 14px; border-radius: var(--radius); cursor: pointer; font-weight: 700; margin-bottom: 25px; transition: var(--transition); }
        .playlist-trigger:hover { border-color: var(--accent); color: #fff; }
        .playlist-container { background: var(--bg-sidebar); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 15px; overflow: hidden; }
        .playlist-head { padding: 15px 20px; background: rgba(255,255,255,0.01); border-bottom: 1px solid var(--border); font-size: 16px; font-weight: 700; display: flex; justify-content: space-between; }

        /* НИЖНИЙ ПЛЕЙБАР */
        .player-footer { position: fixed; bottom: 0; left: 0; width: 100%; height: 110px; background: rgba(6,9,19,0.94); backdrop-filter: blur(25px); border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; z-index: 100; }
        .footer-left { width: 25%; display: flex; align-items: center; gap: 15px; overflow: hidden; }
        .footer-center { width: 50%; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .footer-right { width: 25%; display: flex; align-items: center; justify-content: flex-end; gap: 10px; }

        .m-img { width: 52px; height: 52px; border-radius: 8px; object-fit: cover; background: #000; }
        .m-play { width: 46px; height: 46px; border-radius: 50%; background: #fff; color: #000; border: none; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: var(--transition); }
        .m-play:hover { transform: scale(1.05); }

        .timeline-box { display: flex; align-items: center; gap: 12px; width: 100%; max-width: 600px; }
        .slider { flex-grow: 1; height: 4px; accent-color: var(--accent); background: #222943; border-radius: 2px; cursor: pointer; outline: none; }
        .time-display { font-size: 12px; color: var(--muted); width: 35px; font-variant-numeric: tabular-nums; }

        #visualizer-canvas { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; opacity: 0.15; }

        /* КОНТЕКСТНОЕ МЕНЮ ДОБАВЛЕНИЯ */
        .pop-menu { position: relative; }
        .pop-dropdown { display: none; position: absolute; right: 0; bottom: 30px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; min-width: 150px; z-index: 200; padding: 5px 0; }
        .pop-dropdown button { background: none; border: none; color: #fff; width: 100%; padding: 8px 12px; text-align: left; cursor: pointer; font-size: 13px; }
        .pop-dropdown button:hover { background: rgba(255,255,255,0.05); color: var(--accent); }
        .pop-menu.active .pop-dropdown { display: block; }
    </style>
</head>
<body>

    <!-- СЛЕВА: ПАНЕЛЬ УПРАВЛЕНИЯ -->
    <aside class="sidebar" id="sidebar-node">
        <div class="sidebar-header">
            <div class="logo">MUZIDOG</div>
            <button class="burger-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
        </div>
        
        <div class="search-wrapper">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="music-search" placeholder="Поиск музыки мира...">
        </div>

        <nav class="nav-menu">
            <button class="nav-item active" id="btn-pane-all" onclick="switchPane(event, 'pane-all')"><i class="fa-solid fa-music"></i> <span>Tracks</span></button>
            <button class="nav-item" id="btn-pane-favs" onclick="switchPane(event, 'pane-favs')"><i class="fa-solid fa-heart"></i> <span>Favorites</span></button>
            <button class="nav-item" id="btn-pane-play" onclick="switchPane(event, 'pane-play')"><i class="fa-solid fa-folder"></i> <span>Playlists</span></button>
            <button class="nav-item" id="btn-pane-hist" onclick="switchPane(event, 'pane-hist')"><i class="fa-solid fa-history"></i> <span>History</span></button>
        </nav>
    </aside>

    <!-- ЦЕНТР/СПРАВА: ВЫВОД ДАННЫХ -->
    <main class="main-view">
        
        <div id="pane-all" class="view-pane active">
            <h2 class="pane-title" id="main-title">Популярные треки</h2>
            <div class="track-grid" id="container-all"></div>
        </div>

        <div id="pane-favs" class="view-pane">
            <h2 class="pane-title">Избранное (Локально)</h2>
            <div class="track-grid" id="container-favs"></div>
        </div>

        <div id="pane-play" class="view-pane">
            <button class="playlist-trigger" onclick="createPlaylist()"><i class="fa-solid fa-plus"></i> Создать новый плейлист</button>
            <div id="container-playlists"></div>
        </div>

        <div id="pane-hist" class="view-pane">
            <h2 class="pane-title">История прослушиваний</h2>
            <div class="track-grid" id="container-hist"></div>
        </div>

    </main>

    <!-- НИЖНИЙ ПЛЕЙБАР -->
    <footer class="player-footer">
        <canvas id="visualizer-canvas"></canvas>

        <div class="footer-left">
            <img src="https://placehold.co/100x100/14192d/fff?text=MD" class="m-img" id="master-cover">
            <div class="track-text">
                <span class="track-title" id="master-title">Плеер пуст</span>
                <span class="track-artist" id="master-artist">Используй поиск слева</span>
            </div>
        </div>

        <div class="footer-center">
            <div style="display: flex; align-items: center; gap: 20px;">
                <button class="action-icon" style="font-size: 18px;" onclick="stepTrack(-1)"><i class="fa-solid fa-backward-step"></i></button>
                <button class="m-play" id="master-play-btn" onclick="togglePlayback()"><i class="fa-solid fa-play"></i></button>
                <button class="action-icon" style="font-size: 18px;" onclick="stepTrack(1)"><i class="fa-solid fa-forward-step"></i></button>
            </div>
            <div class="timeline-box">
                <span class="time-display" id="time-current">0:00</span>
                <input type="range" class="slider" id="track-timeline" value="0" max="100" oninput="setTrackTime(this.value)">
                <span class="time-display" id="time-total">0:00</span>
            </div>
        </div>

        <div class="footer-right">
            <i class="fa-solid fa-volume-high" style="color: var(--muted);"></i>
            <input type="range" class="slider" id="track-volume" min="0" max="100" value="80" style="max-width: 80px;" oninput="setTrackVolume(this.value)">
        </div>
    </footer>

    <script>
        const audio = new Audio();
        audio.crossOrigin = "anonymous"; // Полная поддержка визуализатора без CORS blocks

        let activeQueue = [];
        let playbackIndex = 0;

        let dbFavs = JSON.parse(localStorage.getItem('md_sys_favs')) || [];
        let dbPlaylists = JSON.parse(localStorage.getItem('md_sys_playlists')) || {};
        let dbHistory = JSON.parse(localStorage.getItem('md_sys_hist')) || [];

        function toggleSidebar() {
            document.getElementById("sidebar-node").classList.toggle("collapsed");
        }

        function switchPane(e, paneId) {
            document.querySelectorAll('.view-pane').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            
            document.getElementById(paneId).classList.add('active');
            e.currentTarget.classList.add('active');

            if(paneId === 'pane-favs') buildFavs();
            if(paneId === 'pane-play') buildPlaylists();
            if(paneId === 'pane-hist') buildHistory();
        }

        // ЖЕЛЕЗОБЕТОННЫЙ ДВИЖОК ПОИСКА (iTunes API — 100% стабильность, без сбоев)
        async function runSearch(query) {
            const root = document.getElementById("container-all");
            root.innerHTML = "<div style='color: var(--muted); padding:20px;'>Поиск по мировому каталогу...</div>";
            
            try {
                const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=40`);
                const json = await res.json();
                
                if(!json.results || json.results.length === 0) {
                    root.innerHTML = "<div style='color: var(--muted); padding:20px;'>Ничего не найдено. Проверь название трека.</div>";
                    return;
                }

                activeQueue = json.results.map(t => ({
                    id: String(t.trackId),
                    title: t.trackName,
                    artist: t.artistName,
                    cover: t.artworkUrl100.replace("100x100bb", "400x400bb"),
                    audio: t.previewUrl
                }));

                renderMainList();
            } catch (err) {
                root.innerHTML = "<div style='color: var(--pink); padding:20px;'>Ошибка сети. Попробуй еще раз.</div>";
            }
        }

        function renderMainList() {
            const root = document.getElementById("container-all");
            root.innerHTML = "";
            activeQueue.forEach((track, idx) => root.appendChild(assembleRow(track, idx, activeQueue)));
        }

        function assembleRow(track, idx, queueContext) {
            const row = document.createElement('div');
            row.className = `track-card ${audio.src === track.audio ? 'active' : ''}`;
            const isLiked = dbFavs.some(f => f.id === track.id);

            row.innerHTML = `
                <div class="track-details" onclick="bootTrack(${idx}, ${JSON.stringify(queueContext).replace(/"/g, '&quot;')})">
                    <img src="${track.cover}" class="track-art">
                    <div class="track-text">
                        <div class="track-title">${track.title}</div>
                        <div class="track-artist">${track.artist}</div>
                    </div>
                </div>
                <div class="track-controls">
                    <button class="action-icon ${isLiked ? 'active' : ''}" onclick="likeAction(event, ${JSON.stringify(track).replace(/"/g, '&quot;')})">
                        <i class="fa-${isLiked ? 'solid' : 'regular'} fa-heart"></i>
                    </button>
                    <div class="pop-menu">
                        <button class="action-icon" onclick="openPlaylistDropdown(event)"><i class="fa-solid fa-plus"></i></button>
                        <div class="pop-dropdown">
                            ${Object.keys(dbPlaylists).map(pName => `<button onclick="pushToPlaylist(event, '${track.id}', '${pName}')">${pName}</button>`).join('') || '<button disabled style="color:var(--muted)">Нет плейлистов</button>'}
                        </div>
                    </div>
                </div>
            `;
            return row;
        }

        function bootTrack(idx, queue) {
            activeQueue = queue;
            playbackIndex = idx;
            const track = activeQueue[playbackIndex];

            document.getElementById("master-title").textContent = track.title;
            document.getElementById("master-artist").textContent = track.artist;
            document.getElementById("master-cover").src = track.cover;

            audio.src = track.audio;
            audio.play().catch(() => {});
            document.getElementById("master-play-btn").innerHTML = `<i class="fa-solid fa-pause"></i>`;
            
            initEQ();

            // Пишем в историю
            dbHistory = dbHistory.filter(h => h.id !== track.id);
            dbHistory.unshift(track);
            if(dbHistory.length > 40) dbHistory.pop();
            localStorage.setItem('md_sys_hist', JSON.stringify(dbHistory));

            document.querySelectorAll('.track-card').forEach(c => c.classList.remove('active'));
            event.currentTarget?.closest('.track-card')?.classList.add('active');
        }

        function togglePlayback() {
            if(!audio.src) return;
            if(audio.paused) {
                audio.play();
                document.getElementById("master-play-btn").innerHTML = `<i class="fa-solid fa-pause"></i>`;
            } else {
                audio.pause();
                document.getElementById("master-play-btn").innerHTML = `<i class="fa-solid fa-play"></i>`;
            }
        }

        function stepTrack(dir) {
            let n = playbackIndex + dir;
            if(n >= 0 && n < activeQueue.length) bootTrack(n, activeQueue);
        }

        function setTrackTime(val) { if(audio.duration) audio.currentTime = (val / 100) * audio.duration; }
        function setTrackVolume(val) { audio.volume = val / 100; }

        audio.addEventListener('timeupdate', () => {
            if(!audio.duration) return;
            document.getElementById("track-timeline").value = (audio.currentTime / audio.duration) * 100;
            document.getElementById("time-current").textContent = formatClock(audio.currentTime);
            document.getElementById("time-total").textContent = formatClock(audio.duration);
        });
        audio.addEventListener('ended', () => stepTrack(1));

        function formatClock(s) {
            const m = Math.floor(s / 60); const sec = Math.floor(s % 60);
            return `${m}:${sec < 10 ? '0' : ''}${sec}`;
        }

        // Лайки
        function likeAction(e, track) {
            e.stopPropagation();
            const idx = dbFavs.findIndex(f => f.id === track.id);
            if(idx > -1) dbFavs.splice(idx, 1);
            else dbFavs.push(track);
            
            localStorage.setItem('md_sys_favs', JSON.stringify(dbFavs));
            
            if(document.getElementById('pane-all').classList.contains('active')) renderMainList();
            if(document.getElementById('pane-favs').classList.contains('active')) buildFavs();
        }

        function createPlaylist() {
            const name = prompt("Название нового плейлиста:");
            if(!name || !name.trim()) return;
            if(dbPlaylists[name.trim()]) return;
            dbPlaylists[name.trim()] = [];
            localStorage.setItem('md_sys_playlists', JSON.stringify(dbPlaylists));
            buildPlaylists();
            if(document.getElementById('pane-all').classList.contains('active')) renderMainList();
        }

        function pushToPlaylist(e, trackId, pName) {
            e.stopPropagation();
            if(!dbPlaylists[pName].includes(trackId)) {
                dbPlaylists[pName].push(trackId);
                localStorage.setItem('md_sys_playlists', JSON.stringify(dbPlaylists));
            }
            document.querySelectorAll('.pop-menu').forEach(d => d.classList.remove('active'));
        }

        // Перерисовка вкладок
        function buildFavs() {
            const c = document.getElementById("container-favs"); c.innerHTML = dbFavs.length === 0 ? "<div style='color:var(--muted)'>Избранное пусто.</div>" : "";
            dbFavs.forEach((t, i) => c.appendChild(assembleRow(t, i, dbFavs)));
        }
        function buildHistory() {
            const c = document.getElementById("container-hist"); c.innerHTML = dbHistory.length === 0 ? "<div style='color:var(--muted)'>История пуста.</div>" : "";
            dbHistory.forEach((t, i) => c.appendChild(assembleRow(t, i, dbHistory)));
        }
        function buildPlaylists() {
            const c = document.getElementById("container-playlists"); c.innerHTML = "";
            const keys = Object.keys(dbPlaylists);
            if(keys.length === 0) c.innerHTML = "<div style='color:var(--muted)'>Нет созданных плейлистов.</div>";
            
            keys.forEach(pName => {
                const box = document.createElement('div');
                box.className = 'playlist-container';
                box.innerHTML = `<div class="playlist-head"><span>${pName}</span><span style="color:var(--muted); font-size:13px;">${dbPlaylists[pName].length} треков</span></div>`;
                
                const subGrid = document.createElement('div');
                subGrid.className = 'track-grid';
                subGrid.style.padding = '15px';
                
                const storagePool = [...dbFavs, ...dbHistory, ...activeQueue];
                const tracks = dbPlaylists[pName].map(id => storagePool.find(t => t.id === id)).filter(Boolean);
                
                if(tracks.length === 0) subGrid.innerHTML = "<div style='color:var(--muted); font-size:13px;'>Плейлист пуст. Добавь треки через '+'</div>";
                tracks.forEach((t, i) => subGrid.appendChild(assembleRow(t, i, tracks)));
                
                box.appendChild(subGrid);
                c.appendChild(box);
            });
        }

        function openPlaylistDropdown(e) {
            e.stopPropagation();
            const root = e.currentTarget.parentElement;
            document.querySelectorAll('.pop-menu').forEach(d => { if(d !== root) d.classList.remove('active'); });
            root.classList.toggle('active');
        }

        window.addEventListener('click', () => document.querySelectorAll('.pop-menu').forEach(d => d.classList.remove('active')));

        // Поиск по Enter
        document.getElementById("music-search").addEventListener("keypress", (e) => {
            if (e.key === "Enter") {
                const q = e.target.value.trim();
                if(q) {
                    document.getElementById("main-title").textContent = `Результаты поиска для: "${q}"`;
                    document.getElementById("btn-pane-all").click();
                    runSearch(q);
                }
            }
        });

        // ЭКВАЛАЙЗЕР СВЯЗАННЫЙ С КОНТЕКСТОМ
        let aCtx, analyser, source, bLen, dArray;
        const canvas = document.getElementById("visualizer-canvas");
        const ctx = canvas.getContext("2d");

        function initEQ() {
            if(aCtx) return;
            aCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = aCtx.createAnalyser();
            source = aCtx.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(aCtx.destination);
            analyser.fftSize = 64;
            bLen = analyser.frequencyBinCount;
            dArray = new Uint8Array(bLen);
            
            function render() {
                requestAnimationFrame(render);
                analyser.getByteFrequencyData(dArray);
                ctx.clearRect(0,0,canvas.width, canvas.height);
                const widthStep = canvas.width / bLen;
                for(let i=0; i<bLen; i++) {
                    const h = (dArray[i]/255) * canvas.height * 0.85;
                    ctx.fillStyle = `rgba(0, 242, 254, ${dArray[i]/255})`;
                    ctx.fillRect(i*widthStep, canvas.height - h, widthStep - 3, h);
                }
            }
            function resize() { canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight; }
            window.addEventListener('resize', resize);
            resize();
            render();
        }

        // Первый дефолтный запуск плеера
        runSearch("phonk alternative electro");
    </script>
</body>
</html>
